server.port=8080
server.servlet.context-path=/api

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/pingup?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.h2.console.enabled=false

app.jwt.secret=change-this-secret-to-a-long-random-production-value
app.jwt.expiration-ms=604800000
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*
app.admin.first-email=${FIRST_ADMIN_EMAIL:admin@example.com}
