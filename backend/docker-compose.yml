services:
  mysql:
    image: mysql:8.0
    container_name: pingup-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pingup
      MYSQL_USER: pingup_user
      MYSQL_PASSWORD: pingup_password
    ports:
      - "3306:3306"
    volumes:
      - pingup_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

volumes:
  pingup_mysql_data:
