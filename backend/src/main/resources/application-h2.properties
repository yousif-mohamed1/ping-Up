server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:file:./data/pingup;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=change-this-secret-to-a-long-random-production-value
app.jwt.expiration-ms=604800000
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*
app.admin.first-email=${FIRST_ADMIN_EMAIL:admin@example.com}
